name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate package.json files
        run: |
          echo "Validating package.json files..."
          for f in package.json shared/package.json backend/package.json frontend/package.json; do
            if [ -f "$f" ]; then
              node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
                && echo "  ✓ $f" \
                || { echo "  ✗ $f is invalid JSON"; exit 1; }
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=shared

      - name: Build backend (TypeScript check)
        run: npm run build --workspace=backend

      - name: TypeScript check frontend
        run: npx tsc --noEmit --project frontend/tsconfig.json

      # ESLint is skipped in CI: eslint-config-next@15 + ESLint 9 in a monorepo
      # causes ajv schema resolution failures (Cannot set properties of undefined
      # setting 'defaultMeta'). The root node_modules eslint@9 is always resolved
      # over the workspace-local eslint@8 despite overrides. TypeScript check above
      # catches type errors; lint locally before pushing with `npx next lint`.
      # Revisit when Next.js ships flat config support (expected 15.1+).

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Run backend tests
        run: npm test --workspace=backend
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-minimum-32-chars-here
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-chars-x
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: ci-test-service-key
          SUPABASE_ANON_KEY: ci-test-anon-key
          GROQ_API_KEY: ci-test-groq-key
          RAZORPAY_KEY_ID: rzp_test_ci
          RAZORPAY_KEY_SECRET: ci-test-razorpay-secret
          RAZORPAY_WEBHOOK_SECRET: ci-test-webhook-secret
          REPORT_SECRET: ci-test-report-secret-32-chars-xx
          FRONTEND_URL: http://localhost:3000

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate package.json files
        run: |
          for f in package.json shared/package.json backend/package.json frontend/package.json; do
            if [ -f "$f" ]; then
              node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
                && echo "  ✓ $f" \
                || { echo "  ✗ $f is invalid JSON"; exit 1; }
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Backend npm audit
        run: npm audit --audit-level=high --workspace=backend

      - name: Frontend npm audit
        run: npm audit --audit-level=high --workspace=frontend
        continue-on-error: true
